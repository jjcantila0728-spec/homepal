<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HomePal — Family Hub</title>
<meta name="description" content="HomePal is an all-in-one family hub: shared calendar, finances, smart-home control, chores, and shopping — all in one place.">
<meta name="theme-color" content="#0B1120">
<meta name="color-scheme" content="dark">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HomePal">
<meta name="mobile-web-app-capable" content="yes">
<meta property="og:type" content="website">
<meta property="og:title" content="HomePal — Family Hub">
<meta property="og:description" content="Shared calendar, finances, smart-home control, chores, and shopping — all in one place.">
<meta name="twitter:card" content="summary">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/app.css">
<link rel="modulepreload" href="src/main.js">
</head>
<body>
<div id="boot"><div class="boot-logo"><i class="fa-solid fa-house-chimney"></i></div><div class="boot-spin" role="status" aria-label="Loading"></div><div class="text-xs">Starting HomePal…</div></div>
<noscript><div style="padding:48px;text-align:center;color:#F1F5F9;font-family:sans-serif">HomePal needs JavaScript enabled to run.</div></noscript>

<div class="ambient">
  <div class="ambient-orb" style="width:500px;height:500px;background:var(--accent);top:10%;left:15%"></div>
  <div class="ambient-orb" style="width:400px;height:400px;background:var(--amber);top:55%;right:5%;animation-delay:-8s"></div>
  <div class="ambient-orb" style="width:350px;height:350px;background:var(--pink);bottom:5%;left:35%;animation-delay:-15s"></div>
</div>

<div class="flex h-screen relative z-10">
<aside id="sidebar">
  <div class="p-5 border-b border-[var(--border)]">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center"><i class="fa-solid fa-house-chimney text-white text-sm"></i></div>
      <div class="flex-1 min-w-0"><h1 class="text-base font-bold tracking-tight" style="font-family:'Space Grotesk'">HomePal</h1><p class="text-[10px] text-[var(--muted)] -mt-0.5">Family Hub</p></div>
      <button class="icon-btn md:hidden" onclick="toggleSidebar()" title="Close sidebar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg></button>
    </div>
  </div>
  <nav class="flex-1 py-3" id="nav-list"></nav>
  <div class="p-4 border-t border-[var(--border)]" id="sidebar-user"></div>
</aside>
<div id="sidebar-backdrop" onclick="toggleSidebar()"></div>
<div class="flex-1 flex flex-col min-h-screen main-wrap">
  <header class="h-14 border-b border-[var(--border)] bg-[var(--bg2)]/80 backdrop-blur-md flex items-center gap-2 sm:gap-3 px-3 sm:px-5 flex-shrink-0 relative z-40">
    <div class="flex items-center gap-2 min-w-0 flex-shrink-0">
      <button class="icon-btn md:hidden" onclick="toggleSidebar()" title="Toggle sidebar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg></button>
      <h2 class="text-base font-semibold truncate" id="page-title">Dashboard</h2>
    </div>
    <div class="flex-1"></div>
    <div class="flex items-center gap-1.5 sm:gap-2 flex-shrink-0">
      <span class="text-xs text-[var(--muted)] hidden lg:inline mr-1" id="live-clock"></span>
      <div class="navsearch" id="navsearch-wrap">
        <input id="navsearch" class="navsearch-input" type="text" placeholder="Search…" autocomplete="off" aria-label="Search" oninput="navSearch(this.value)" onkeydown="navSearchKey(event)" onblur="setTimeout(collapseNavSearch,180)">
        <button class="icon-btn navsearch-toggle" id="navsearch-toggle" onclick="toggleNavSearch()" title="Search" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></button>
        <div id="navsearch-results"></div>
      </div>
      <button class="icon-btn" id="voice-btn" title="Voice control (Alexa / Siri compatible)" onclick="startListening()"><i class="fa-solid fa-microphone"></i></button>
      <button class="icon-btn" onclick="toggleNotif()" title="Notifications"><i class="fa-regular fa-bell text-base"></i><span class="absolute top-1.5 right-1.5 w-2 h-2 bg-[var(--red)] rounded-full" id="notif-dot" style="display:none"></span></button>
      <div id="user-switcher"></div>
    </div>
    <div id="notif-panel"></div>
  </header>
  <main class="flex-1 overflow-y-auto p-5" id="content"></main>
</div>
</div>

<nav id="mobile-bar" class="fixed bottom-0 left-0 right-0 bg-[var(--bg2)] border-t border-[var(--border)] z-50 hidden justify-around py-1.5"></nav>
<div id="search-overlay" onclick="event.target===this&&closeSearch()"><div id="search-box"><div class="p-4 border-b border-[var(--border)] flex items-center gap-3"><i class="fa-solid fa-magnifying-glass text-[var(--muted)]"></i><input class="bg-transparent border-none outline-none flex-1 text-sm" id="search-input" placeholder="Search everything..." oninput="doSearch(this.value)"><kbd class="text-[10px] text-[var(--muted)] bg-[var(--surface)] px-2 py-0.5 rounded">ESC</kbd></div><div id="search-results" class="max-h-72 overflow-y-auto p-2"></div></div></div>
<div id="scene-overlay"><div class="scene-splash" id="scene-splash-inner"></div></div>
<div id="modal-overlay" onclick="event.target===this&&hideModal()"><div id="modal-box" role="dialog" aria-modal="true" aria-label="Dialog"></div></div>
<div id="toast-container" aria-live="polite" aria-atomic="false"></div>

<script type="module" src="src/main.js"></script>
</body>
</html>
